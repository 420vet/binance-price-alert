name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: trade-alert-windows.exe
          - os: macos-latest
            artifact: trade-alert-macos
          - os: ubuntu-latest
            artifact: trade-alert-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller trade_alert.spec

      - name: Rename (Windows)
        if: runner.os == 'Windows'
        run: mv dist/trade-alert.exe dist/trade-alert-windows.exe

      - name: Rename (non-Windows)
        if: runner.os != 'Windows'
        run: mv dist/trade-alert dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
